<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Task Cockpit</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<style>
  :root {
    --bg:          #EEF0F5;
    --card:        #FFFFFF;
    --border:      #E2E8F0;
    --border-light:#F1F5F9;
    --text-1:      #0F172A;
    --text-2:      #475569;
    --text-3:      #94A3B8;
    --accent:      #6366F1;
    --accent-soft: #EEF2FF;
    --amber:       #F59E0B;
    --amber-soft:  #FFFBEB;
    --red:         #EF4444;
    --topbar-bg:   #1E293B;
    --topbar-text: #F8FAFC;
    --shadow-sm:   0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md:   0 4px 14px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --radius:      10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text-1);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Top bar ── */
  #topbar {
    background: var(--topbar-bg);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    height: 52px;
  }
  #topbar h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--topbar-text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #topbar h1::before {
    content: '';
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--amber);
    border-radius: 50%;
    flex-shrink: 0;
  }
  #topbar-date { font-size: 12px; color: #64748B; }
  #counts { font-size: 12px; color: #64748B; }
  #counts strong { color: #CBD5E1; }

  /* ── Main content ── */
  #main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px 20px 48px;
  }

  /* ── Section label ── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Focus box ── */
  #focus-section { margin-bottom: 24px; }
  #focus-box {
    border-left: 3px solid var(--amber);
    border-radius: 0 var(--radius) var(--radius) 0;
    background: var(--card);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
  }
  #focus-box .focus-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
  }

  /* ── Focus cards ── */
  .focus-card {
    background: var(--amber-soft);
    border: 1px solid #FDE68A;
    border-left: 3px solid var(--amber);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    transition: box-shadow .15s;
  }
  .focus-card:hover { box-shadow: var(--shadow-sm); }
  .focus-card:last-child { margin-bottom: 0; }
  .focus-card.blocked-card { border-left-color: #F97316; }
  .task-title { font-weight: 600; font-size: 14px; margin-bottom: 3px; }

  /* ── Projects grid ── */
  #cols {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .proj-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow .15s;
    position: relative;
  }
  .proj-card:hover { box-shadow: var(--shadow-md); }
  .proj-card:hover .proj-menu { display: flex; }
  .proj-menu { display: none; gap: 4px; align-items: center; }
  .proj-menu-btn {
    background: none; border: none; cursor: pointer; font-size: 11px;
    color: var(--text-3); padding: 2px 7px; border-radius: 4px;
    font-weight: 500;
  }
  .proj-menu-btn:hover { background: var(--border-light); color: var(--text-2); }
  .proj-menu-btn.danger:hover { background: #FEE2E2; color: var(--red); }
  .proj-header {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-1);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .proj-header .task-count {
    font-size: 11px;
    font-weight: 500;
    background: var(--border-light);
    color: var(--text-3);
    border-radius: 999px;
    padding: 2px 8px;
  }
  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-light);
  }
  .task-row:last-child { border-bottom: none; }
  .task-row.draft-row {
    border: 1.5px dashed #FCD34D;
    border-radius: 6px;
    padding: 7px 9px;
    margin-bottom: 4px;
    background: var(--amber-soft);
  }
  .task-row.draft-row:last-child { margin-bottom: 0; }
  .status-icon {
    flex-shrink: 0;
    margin-top: 2px;
    font-size: 13px;
    color: var(--text-3);
    cursor: pointer;
  }
  .status-icon:hover { opacity: .6; }
  .status-icon.in-progress { color: var(--accent); }
  .task-body { flex: 1; min-width: 0; }
  .empty-proj { color: var(--text-3); font-size: 13px; padding: 8px 0; }

  /* ── Done today ── */
  #done-section { margin-bottom: 24px; }
  #done-section details {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    box-shadow: var(--shadow-sm);
  }
  #done-section summary {
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-2);
    user-select: none;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #done-section summary::-webkit-details-marker { display: none; }
  #done-section summary::before { content: "▶"; font-size: 9px; color: var(--text-3); }
  #done-section details[open] summary::before { content: "▼"; }
  .done-list { margin-top: 12px; }
  .done-item { padding: 8px 0; border-bottom: 1px solid var(--border-light); }
  .done-item:last-child { border-bottom: none; }
  .done-title {
    font-weight: 600; font-size: 13px; margin-bottom: 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .done-title::before { content: "✓"; color: #10B981; font-size: 12px; }
  .done-meta { font-size: 12px; color: var(--text-2); line-height: 1.5; }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    border-radius: 4px;
    padding: 1px 6px;
    vertical-align: middle;
    margin-left: 4px;
    letter-spacing: 0.02em;
  }
  .badge-draft { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
  .badge-cv    { background: #FEE2E2; color: #991B1B; }
  .badge-blocked { color: #F97316; font-size: 11px; }

  /* ── Meta line ── */
  .meta {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 3px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }
  .meta-sep { color: var(--border); }
  .pri-high { color: var(--red); font-weight: 600; }
  .pri-mid  { color: var(--amber); font-weight: 600; }
  .pri-low  { color: var(--text-3); }
  .next-action {
    color: var(--text-2);
    font-size: 12px;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .next-action::before { content: "▸ "; color: var(--accent); }

  /* ── Time dimension ── */
  #topbar-date { font-size: 12px; color: #64748B; }
  .due-overdue { color: var(--red); font-weight: 600; }
  .due-today   { color: #F97316; font-weight: 600; }
  .due-soon    { color: var(--amber); font-weight: 600; }
  .due-normal  { color: var(--text-3); }
  .task-age    { color: var(--border); font-size: 11px; }

  /* ── Interactive controls ── */
  .proj-add-btn, .new-proj-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--text-3);
    font-size: 12px;
    cursor: pointer;
    padding: 5px 10px;
    width: 100%;
    margin-top: 10px;
    transition: all .15s;
    font-family: inherit;
  }
  .proj-add-btn:hover, .new-proj-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .new-proj-btn { margin: 0 0 14px; }
  .task-actions { display: none; gap: 4px; margin-left: auto; flex-shrink: 0; }
  .task-row:hover .task-actions { display: flex; }
  .task-action-btn {
    background: none; border: none; cursor: pointer; font-size: 13px;
    color: var(--text-3); padding: 1px 4px; border-radius: 3px;
  }
  .task-action-btn:hover { color: var(--text-1); background: var(--border-light); }

  /* ── Checklist ── */
  .checklist { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .cl-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-2); }
  .cl-item input[type=checkbox] { cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
  .cl-item.done span { text-decoration: line-through; color: var(--text-3); }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,23,42,.4);
    z-index: 100; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    width: min(480px, 94vw);
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,.18);
    border: 1px solid var(--border);
  }
  .modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 18px; color: var(--text-1); }
  .modal label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 5px; margin-top: 14px;
  }
  .modal input[type=text], .modal input[type=date], .modal select, .modal textarea {
    width: 100%; border: 1px solid var(--border); border-radius: 7px;
    padding: 8px 11px; font-size: 13px; color: var(--text-1);
    font-family: inherit; outline: none; background: var(--card);
    transition: border-color .15s;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,.1);
  }
  .modal textarea { resize: vertical; min-height: 60px; }
  .cl-edit-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px; }
  .cl-edit-row { display: flex; gap: 6px; align-items: center; }
  .cl-edit-row input[type=text] { flex: 1; }
  .cl-edit-row button { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 16px; padding: 0 4px; }
  .cl-edit-row button:hover { color: var(--red); }
  .add-cl-item {
    background: none; border: 1px dashed var(--border); border-radius: 6px;
    color: var(--text-3); font-size: 12px; cursor: pointer;
    padding: 5px 10px; font-family: inherit;
  }
  .add-cl-item:hover { border-color: var(--accent); color: var(--accent); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; }
  .btn { padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all .12s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4F46E5; }
  .btn-ghost { background: var(--border-light); color: var(--text-2); }
  .btn-ghost:hover { background: var(--border); }
  .btn-danger { background: #FEE2E2; color: var(--red); }
  .btn-danger:hover { background: #FECACA; }

  /* ── Tabs ── */
  #tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text-3);
    padding: 10px 20px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all .15s;
    font-family: inherit;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text-2); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── Achievements view ── */
  .ach-proj-group { margin-bottom: 28px; }
  .ach-proj-title {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .ach-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 13px 15px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
  }
  .ach-item-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
  .ach-title { font-weight: 600; font-size: 14px; flex: 1; color: var(--text-1); }
  .ach-date { font-size: 11px; color: var(--text-3); flex-shrink: 0; margin-top: 2px; }
  .ach-cv { font-size: 13px; color: var(--text-2); line-height: 1.6; }
  .ach-reflection {
    font-size: 12px; color: var(--text-3);
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border-light);
    font-style: italic;
  }
  .badge-pending { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; font-size: 10px; font-weight: 600; border-radius: 4px; padding: 1px 6px; }
  .ach-empty { color: var(--text-3); font-size: 13px; text-align: center; padding: 48px 0; }

  /* ── Footer ── */
  footer {
    text-align: center;
    color: var(--text-3);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 20px 0;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>Task Cockpit</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <div id="topbar-date">—</div>
    <div id="counts">—</div>
  </div>
</div>

<div id="main">
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('board')">看板</button>
    <button class="tab-btn" onclick="switchTab('achievements')">成就库</button>
  </div>
  <div id="tab-board" class="tab-pane active">
    <div id="focus-section"></div>
    <div id="cols"></div>
    <div id="done-section"></div>
  </div>
  <div id="tab-achievements" class="tab-pane">
    <div id="ach-view"></div>
  </div>
  <footer>○ 未开始　◐ 进行中　|　每 2 秒自动刷新</footer>
</div>

<!-- Task edit / add modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h2 id="modal-title">编辑任务</h2>
    <input type="hidden" id="m-task-id">
    <input type="hidden" id="m-project-id">
    <label>任务标题</label>
    <input type="text" id="m-title" placeholder="任务标题">
    <label>优先级</label>
    <select id="m-priority">
      <option value="高">🔴 高</option>
      <option value="中" selected>🟡 中</option>
      <option value="低">⚪ 低</option>
    </select>
    <label>截止日期</label>
    <input type="date" id="m-due">
    <label>下一步行动</label>
    <textarea id="m-next" rows="2" placeholder="当前最重要的一件事…"></textarea>
    <label>检查清单</label>
    <div class="cl-edit-list" id="m-cl-list"></div>
    <button class="add-cl-item" id="m-cl-add">＋ 添加清单项</button>
    <div class="modal-footer">
      <button class="btn btn-danger" id="m-delete" style="margin-right:auto;display:none">删除任务</button>
      <button class="btn btn-ghost" id="m-cancel">取消</button>
      <button class="btn btn-primary" id="m-save">保存</button>
    </div>
  </div>
</div>

<!-- New project modal -->
<div class="modal-overlay" id="proj-modal">
  <div class="modal">
    <h2>新建项目</h2>
    <label>项目名称</label>
    <input type="text" id="p-name" placeholder="项目名称">
    <div class="modal-footer">
      <button class="btn btn-ghost" id="p-cancel">取消</button>
      <button class="btn btn-primary" id="p-save">创建</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── HTML escape ──────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── API helpers ─────────────────────────────────────────────────────────────
async function api(path, body) {
  const res = await fetch(path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  return res.json();
}

// ── Checklist HTML ───────────────────────────────────────────────────────────
function clHtml(tid, checklist) {
  if (!checklist || checklist.length === 0) return '';
  const items = checklist.map((c, i) => {
    const done = !!c.done;
    return `<label class="cl-item${done ? ' done' : ''}">
      <input type="checkbox" ${done ? 'checked' : ''} onchange="toggleCl('${tid}',${i},this.checked)">
      <span>${esc(c.text)}</span>
    </label>`;
  }).join('');
  const total = checklist.length, doneN = checklist.filter(c=>c.done).length;
  return `<div class="checklist">${items}</div>
    <div class="meta" style="margin-top:4px"><span style="color:#6b7280;font-size:11px">${doneN}/${total} 完成</span></div>`;
}

async function toggleCl(tid, index, done) {
  await api('/api/task/checklist', {id: tid, index, done});
}

// ── Status cycle ─────────────────────────────────────────────────────────────
const STATUS_CYCLE = {'未开始':'进行中','进行中':'未开始'};
async function cycleStatus(tid, current) {
  const next = STATUS_CYCLE[current] || '进行中';
  await api('/api/task/update', {id: tid, status: next});
}

// ── Priority badge HTML ──────────────────────────────────────────────────────
function priBadge(p) {
  if (p === '高') return '<span class="pri-high">🔴高</span>';
  if (p === '中') return '<span class="pri-mid">🟡中</span>';
  return '<span class="pri-low">⚪低</span>';
}

// ── Time utilities ───────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

function daysDiff(dateStr) {
  const a = new Date(todayStr());
  const b = new Date(dateStr);
  return Math.round((b - a) / 86400000);
}

function relDue(due) {
  if (!due) return '';
  const d = daysDiff(due);
  if (d < 0)  return '<span class="due-overdue">⚠️ 逾期' + Math.abs(d) + '天</span>';
  if (d === 0) return '<span class="due-today">🔥 今天截止</span>';
  if (d === 1) return '<span class="due-soon">⏰ 明天截止</span>';
  if (d <= 3)  return '<span class="due-soon">⏰ 还有' + d + '天</span>';
  return '<span class="due-normal">⏰ ' + due.slice(5) + '</span>';
}

function taskAge(createdAt) {
  if (!createdAt) return '';
  const d = -daysDiff(createdAt);
  if (d <= 2) return '';
  return '<span class="task-age">挂了' + d + '天</span>';
}

// ── Meta line for a task ─────────────────────────────────────────────────────
function pmeta(task) {
  const chips = [];
  if (task.priority) chips.push(priBadge(task.priority));
  if (task.due)      chips.push(relDue(task.due));
  if (task.blocked)  chips.push('<span class="badge-blocked">⏳等待中</span>');
  const age = taskAge(task.createdAt);
  if (age) chips.push(age);
  const metaLine = chips.length
    ? '<div class="meta">' + chips.join('<span class="meta-sep"> · </span>') + '</div>'
    : '';
  const nextLine = task.nextAction
    ? '<div class="next-action">' + esc(task.nextAction) + '</div>'
    : '';
  return metaLine + nextLine;
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(data) {
  _snapshot = data;
  // Topbar date
  const days = ['日','一','二','三','四','五','六'];
  const now = new Date();
  document.getElementById('topbar-date').textContent =
    (now.getMonth()+1) + '月' + now.getDate() + '日 周' + days[now.getDay()];

  // Counts bar
  const c = data.counts || {};
  const r = c.achievementsReady ?? 0;
  const p = c.achievementsPending ?? 0;
  document.getElementById('counts').innerHTML =
    '累计已沉淀 <strong>' + r + '</strong> 条成就 · <strong>' + p + '</strong> 条待补充';

  // Focus section
  const focusEl = document.getElementById('focus-section');
  if (!data.focus || data.focus.length === 0) {
    focusEl.innerHTML = '';
  } else {
    let cards = '';
    for (const t of data.focus) {
      const extra = t.blocked ? ' blocked-card' : '';
      cards +=
        '<div class="focus-card' + extra + '">' +
          '<div class="task-title">' + esc(t.title) + '</div>' +
          pmeta(t) +
        '</div>';
    }
    focusEl.innerHTML =
      '<div id="focus-box">' +
        '<div class="focus-header">🔥 今日聚焦 · agent 按优先级+截止日算出</div>' +
        cards +
      '</div>';
  }

  // Deterministic emoji per project id
  const PROJECT_EMOJIS = ['🎯','🌟','🔥','💡','🛠️','🎨','🚀','📐','🧩','⚡️','🌈','🎪','🔮','🏆','🌱','🦋','🐬','🦊','🌊','🍀','🎸','🏔️','🌙','☀️','🎭','🧲','🪄','🦄','🐉','🍭','🎲','🧪','🔭','🗺️','🎵','🏄','🌺','🦅','🍋','🎃','🧸','🪐','🌴','🦁','🐙','🎋','🍄','🧊','🪩','🎠'];
  function projEmoji(id) {
    let h = 0;
    for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
    return PROJECT_EMOJIS[h % PROJECT_EMOJIS.length];
  }

  // Projects
  const colsEl = document.getElementById('cols');
  if (!data.projects || data.projects.length === 0) {
    colsEl.innerHTML = '';
  } else {
    let html = '';
    for (const proj of data.projects) {
      const taskCount = proj.tasks ? proj.tasks.length : 0;
      let rows = '';
      if (taskCount === 0) {
        rows = '<div class="empty-proj">暂无任务</div>';
      } else {
        for (const t of proj.tasks) {
          const isDraft = !!t.draft;
          const inProg  = t.status === '进行中';
          const iconCls = inProg ? ' in-progress' : '';
          const icon    = inProg ? '◐' : '○';
          const rowCls  = isDraft ? ' draft-row' : '';
          const draftBadge = isDraft
            ? '<span class="badge badge-draft">草稿待确认</span>'
            : '';
          rows +=
            '<div class="task-row' + rowCls + '">' +
              '<span class="status-icon' + iconCls + '" title="点击切换状态" onclick="cycleStatus(\'' + t.id + '\',\'' + t.status + '\')">' + icon + '</span>' +
              '<div class="task-body">' +
                '<div class="task-title">' + esc(t.title) + draftBadge + '</div>' +
                pmeta(t) +
                clHtml(t.id, t.checklist) +
              '</div>' +
              '<div class="task-actions">' +
                '<button class="task-action-btn" title="编辑" onclick="openEditTask(\'' + t.id + '\')">✏️</button>' +
              '</div>' +
            '</div>';
        }
      }
      html +=
        '<div class="proj-card">' +
          '<div class="proj-header">' +
            '<span>' + projEmoji(proj.id) + ' ' + esc(proj.name) + '</span>' +
            '<div style="display:flex;align-items:center;gap:6px">' +
              '<span class="task-count">' + taskCount + ' 项</span>' +
              '<div class="proj-menu">' +
                '<button class="proj-menu-btn" title="归档项目" onclick="archiveProj(\'' + proj.id + '\',\'' + esc(proj.name) + '\')">归档</button>' +
                '<button class="proj-menu-btn danger" title="删除项目" onclick="deleteProj(\'' + proj.id + '\',\'' + esc(proj.name) + '\')">删除</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
          rows +
          '<button class="proj-add-btn" onclick="openAddTask(\'' + proj.id + '\')">＋ 新增任务</button>' +
        '</div>';
    }
    colsEl.innerHTML =
      '<button class="new-proj-btn" onclick="openAddProject()">＋ 新建项目</button>' +
      html;
  }

  // Done today
  const doneEl = document.getElementById('done-section');
  if (!data.doneToday || data.doneToday.length === 0) {
    doneEl.innerHTML = '';
  } else {
    // Preserve the user's expand/collapse state across the 2s auto-refresh:
    // read whether the <details> is currently open before we rebuild it.
    const prev = doneEl.querySelector('details');
    const wasOpen = prev ? prev.open : false;
    let items = '';
    for (const d of data.doneToday) {
      const text = d.cv || d.outcome || '';
      const cvBadge = d.cvStatus === 'pending'
        ? '<span class="badge badge-cv">CV待补充</span>'
        : '';
      items +=
        '<div class="done-item">' +
          '<div class="done-title">' + esc(d.title) + cvBadge + (d.date ? '<span class="task-age" style="margin-left:6px;">' + d.date.slice(5) + ' 完成</span>' : '') + '</div>' +
          '<div class="done-meta">' + esc(text) + '</div>' +
        '</div>';
    }
    doneEl.innerHTML =
      '<details' + (wasOpen ? ' open' : '') + '>' +
        '<summary>✅ 今天已完成（' + data.doneToday.length + '）</summary>' +
        '<div class="done-list">' + items + '</div>' +
      '</details>';
  }
}

// ── Task modal ───────────────────────────────────────────────────────────────
let _snapshot = null;

function openEditTask(tid) {
  const t = _snapshot.projects.flatMap(p=>p.tasks).find(t=>t.id===tid)
         || _snapshot.focus.find(t=>t.id===tid);
  if (!t) return;
  document.getElementById('modal-title').textContent = '编辑任务';
  document.getElementById('m-task-id').value = tid;
  document.getElementById('m-project-id').value = t.project;
  document.getElementById('m-title').value = t.title;
  document.getElementById('m-priority').value = t.priority || '中';
  document.getElementById('m-due').value = t.due || '';
  document.getElementById('m-next').value = t.nextAction || '';
  document.getElementById('m-delete').style.display = 'inline-flex';
  renderClEdit(t.checklist || []);
  document.getElementById('task-modal').classList.add('open');
  document.getElementById('m-title').focus();
}

function openAddTask(pid) {
  document.getElementById('modal-title').textContent = '新增任务';
  document.getElementById('m-task-id').value = '';
  document.getElementById('m-project-id').value = pid;
  document.getElementById('m-title').value = '';
  document.getElementById('m-priority').value = '中';
  document.getElementById('m-due').value = '';
  document.getElementById('m-next').value = '';
  document.getElementById('m-delete').style.display = 'none';
  renderClEdit([]);
  document.getElementById('task-modal').classList.add('open');
  document.getElementById('m-title').focus();
}

function renderClEdit(items) {
  const list = document.getElementById('m-cl-list');
  list.innerHTML = items.map((c,i) =>
    `<div class="cl-edit-row">
      <input type="text" value="${esc(c.text)}" placeholder="清单项内容" data-cl-index="${i}">
      <button onclick="removeClItem(${i})">×</button>
    </div>`
  ).join('');
}

function removeClItem(index) {
  const rows = document.querySelectorAll('#m-cl-list .cl-edit-row');
  rows[index].remove();
  document.querySelectorAll('#m-cl-list .cl-edit-row').forEach((r,i) => {
    r.querySelector('input').dataset.clIndex = i;
    r.querySelector('button').setAttribute('onclick', `removeClItem(${i})`);
  });
}

document.getElementById('m-cl-add').onclick = () => {
  const list = document.getElementById('m-cl-list');
  const i = list.children.length;
  const row = document.createElement('div');
  row.className = 'cl-edit-row';
  row.innerHTML = `<input type="text" placeholder="清单项内容" data-cl-index="${i}"><button onclick="removeClItem(${i})">×</button>`;
  list.appendChild(row);
  row.querySelector('input').focus();
};

document.getElementById('m-cancel').onclick = () =>
  document.getElementById('task-modal').classList.remove('open');

document.getElementById('m-delete').onclick = async () => {
  const tid = document.getElementById('m-task-id').value;
  if (!tid || !confirm('确认删除这个任务？')) return;
  await api('/api/task/delete', {id: tid});
  document.getElementById('task-modal').classList.remove('open');
};

document.getElementById('m-save').onclick = async () => {
  const tid = document.getElementById('m-task-id').value;
  const pid = document.getElementById('m-project-id').value;
  const title = document.getElementById('m-title').value.trim();
  if (!title) { alert('请填写任务标题'); return; }
  const checklist = [...document.querySelectorAll('#m-cl-list input[type=text]')]
    .map(inp => ({text: inp.value.trim(), done: false}))
    .filter(c => c.text);
  if (tid) {
    // preserve existing done state
    const existing = (_snapshot.projects.flatMap(p=>p.tasks).find(t=>t.id===tid) || {}).checklist || [];
    checklist.forEach((c,i) => { if (existing[i]) c.done = existing[i].done; });
    await api('/api/task/update', {
      id: tid, title,
      priority: document.getElementById('m-priority').value,
      due: document.getElementById('m-due').value,
      nextAction: document.getElementById('m-next').value.trim(),
      checklist,
    });
  } else {
    await api('/api/task/add', {
      project: pid, title,
      priority: document.getElementById('m-priority').value,
      due: document.getElementById('m-due').value,
      nextAction: document.getElementById('m-next').value.trim(),
      checklist,
    });
  }
  document.getElementById('task-modal').classList.remove('open');
};

async function archiveProj(pid, name) {
  if (!confirm(`归档项目「${name}」？归档后不显示在看板，任务保留。`)) return;
  await api('/api/project/update', {id: pid, archived: true});
}

async function deleteProj(pid, name) {
  if (!confirm(`删除项目「${name}」？项目下所有任务也会一并删除，无法恢复。`)) return;
  await api('/api/project/delete', {id: pid});
}

// ── Project modal ─────────────────────────────────────────────────────────────
function openAddProject() {
  document.getElementById('p-name').value = '';
  document.getElementById('proj-modal').classList.add('open');
  document.getElementById('p-name').focus();
}
document.getElementById('p-cancel').onclick = () =>
  document.getElementById('proj-modal').classList.remove('open');
document.getElementById('p-save').onclick = async () => {
  const name = document.getElementById('p-name').value.trim();
  if (!name) { alert('请填写项目名称'); return; }
  await api('/api/project/add', {name});
  document.getElementById('proj-modal').classList.remove('open');
};

// Close on backdrop click
['task-modal','proj-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) document.getElementById(id).classList.remove('open');
  });
});

// ── Tabs ─────────────────────────────────────────────────────────────────────
let _activeTab = 'board';

function switchTab(tab) {
  _activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['board','achievements'][i] === tab);
  });
  document.getElementById('tab-board').classList.toggle('active', tab === 'board');
  document.getElementById('tab-achievements').classList.toggle('active', tab === 'achievements');
  if (tab === 'achievements') loadAchievements();
}

async function loadAchievements() {
  const res = await fetch('/api/achievements');
  const data = await res.json();
  const items = data.items || [];
  const el = document.getElementById('ach-view');

  if (items.length === 0) {
    el.innerHTML = '<div class="ach-empty">还没有已完成的成就，完成任务后会自动沉淀到这里。</div>';
    return;
  }

  // Group by project
  const groups = {};
  for (const a of [...items].reverse()) {
    const key = a.project || '未分组';
    if (!groups[key]) groups[key] = [];
    groups[key].push(a);
  }

  let html = '';
  for (const [proj, achList] of Object.entries(groups)) {
    const rows = achList.map(a => {
      const pending = a.cvStatus === 'pending'
        ? '<span class="badge-pending">CV待补充</span>' : '';
      const reflection = a.reflection
        ? `<div class="ach-reflection">💭 ${esc(a.reflection)}</div>` : '';
      return `<div class="ach-item">
        <div class="ach-item-header">
          <span class="ach-title">${esc(a.title)} ${pending}</span>
          <span class="ach-date">${a.date || ''}</span>
        </div>
        <div class="ach-cv">${esc(a.cv || a.outcome || '')}</div>
        ${reflection}
      </div>`;
    }).join('');
    html += `<div class="ach-proj-group">
      <div class="ach-proj-title">📁 ${esc(proj)} <span style="font-weight:400;color:#9ca3af;font-size:12px">${achList.length} 项</span></div>
      ${rows}
    </div>`;
  }
  el.innerHTML = html;
}

// ── Polling ──────────────────────────────────────────────────────────────────
let lastJson = null;
async function tick() {
  try {
    const res = await fetch('/api/data?t=' + Date.now());
    if (!res.ok) return; // keep last render
    const text = await res.text();
    if (text === lastJson) return; // nothing changed — don't rebuild the DOM
    lastJson = text;
    render(JSON.parse(text));
  } catch (_) {
    // network error or server restart — keep last render, retry next tick
  }
}

tick();
setInterval(tick, 2000);
</script>
